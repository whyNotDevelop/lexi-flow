        "/api/history/count-since/": {
            "get": {
                "operationId": "history_count_since_retrieve",
                "description": "Get number of lookups since a specific date.",
                "summary": "Get lookup count since date",
                "tags": [
                    "history"
                ],
                "security": [
                    {
                        "jwtAuth": []
                    }
                ],
                "responses": {
                    "200": {
                        "content": {
                            "application/json": {
                                "schema": {
                                    "type": "object",
                                    "additionalProperties": {}
                                }
                            }
                        },
                        "description": ""
                    }
                }
            }
        },
        "/api/history/list/": {
            "get": {
                "operationId": "history_list_retrieve",
                "description": "Get number of lookups since a specific date.",
                "summary": "Get lookup count since date",
                "parameters": [
                    {
                        "in": "query",
                        "name": "since",
                        "schema": {
                            "type": "string",
                            "format": "date-time"
                        },
                        "description": "ISO 8601 datetime (e.g., 2024-01-01T00:00:00Z)",
                        "required": true
                    }
                ],
                "tags": [
                    "history"
                ],
                "security": [
                    {
                        "jwtAuth": []
                    }
                ],
                "responses": {
                    "200": {
                        "content": {
                            "application/json": {
                                "schema": {
                                    "type": "object",
                                    "properties": {
                                        "count": {
                                            "type": "integer"
                                        }
                                    }
                                }
                            }
                        },
                        "description": ""
                    }
                }
            }
        },
        "/api/vocabulary/is-saved/{word_id}/": {
            "get": {
                "operationId": "vocabulary_is_saved_retrieve",
                "description": "Check if a specific word is saved in user's vocabulary.",
                "summary": "Check if word is saved",
                "parameters": [
                    {
                        "in": "path",
