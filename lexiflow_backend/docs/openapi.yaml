                            "application/json": {
                                "schema": {
                                    "type": "object",
                                    "additionalProperties": {}
                                }
                            }
                        },
                        "description": ""
                    }
                }
            }
        },
        "/api/vocabulary/list/": {
            "get": {
                "operationId": "vocabulary_list_list",
                "description": "Get all words saved by the user.",
                "summary": "Get user vocabulary",
                "tags": [
                    "vocabulary"
                ],
                "security": [
                    {
                        "jwtAuth": []
                    }
                ],
                "responses": {
                    "200": {
                        "content": {
                            "application/json": {
                                "schema": {
                                    "type": "array",
                                    "items": {
                                        "$ref": "#/components/schemas/VocabularyEntry"
                                    }
                                }
                            }
                        },
                        "description": ""
                    }
                }
            }
        },
        "/api/vocabulary/remove/{word_id}/": {
            "delete": {
                "operationId": "vocabulary_remove_destroy",
                "description": "Remove a word from the user's personal vocabulary list.",
                "summary": "Remove word from vocabulary",
                "parameters": [
                    {
                        "in": "path",
                        "name": "word_id",
                        "schema": {
                            "type": "string"
                        },
                        "required": true
                    }
                ],
                "tags": [
                    "vocabulary"
                ],
                "security": [
                    {
                        "jwtAuth": []
                    }
                ],
                "responses": {
                    "204": {
                        "description": "No response body"
                    }
                }
            }
        },
        "/api/vocabulary/save/{word_id}/": {
            "post": {
                "operationId": "vocabulary_save_create",
                "description": "Save a word to the user's personal vocabulary list.",
                "summary": "Save word to vocabulary",
                "parameters": [
                    {
                        "in": "path",
                        "name": "word_id",
                        "schema": {
                            "type": "string"
                        },
                        "required": true
                    }
                ],
                "tags": [
                    "vocabulary"
                ],
                "security": [
                    {
                        "jwtAuth": []
                    }
                ],
                "responses": {
                    "201": {
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/VocabularyEntry"
                                }
                            }
                        },
                        "description": ""
                    }
                }
            }
        },
        "/api/vocabulary/search/": {
            "get": {
                "operationId": "vocabulary_search_list",
                "description": "Search user's saved vocabulary by word text.",
                "summary": "Search vocabulary",
                "tags": [
                    "vocabulary"
                ],
                "security": [
                    {
                        "jwtAuth": []
                    }
                ],
                "responses": {
                    "200": {
                        "content": {
                            "application/json": {
                                "schema": {
                                    "type": "array",
                                    "items": {
                                        "$ref": "#/components/schemas/VocabularyEntry"
                                    }
                                }
                            }
                        },
                        "description": ""
                    }
                }
            }
        },
        "/api/words/lookup/{word}/": {
            "get": {
                "operationId": "words_lookup_retrieve",
                "description": "Look up a word definition with caching and external API fallback. Records lookup in history.",
                "summary": "Look up a word",
                "parameters": [
                    {
                        "in": "path",
                        "name": "word",
                        "schema": {
                            "type": "string"
                        },
                        "required": true
                    }
                ],
                "tags": [
                    "words"
                ],
                "security": [
                    {
                        "jwtAuth": []
                    }
                ],
                "responses": {
                    "200": {
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/Word"
                                }
                            }
                        },
                        "description": ""
                    }
                }
            }
        }
    },
    "components": {
        "schemas": {
            "Definition": {
                "type": "object",
                "description": "Serializer for Definition domain entity.\n\nHandles serialization of word definitions including part of speech,\nmeaning, examples, and synonyms.",
                "properties": {
                    "id": {
                        "type": "string",
                        "format": "uuid",
                        "readOnly": true
                    },
                    "meaning": {
                        "type": "string"
                    },
                    "part_of_speech": {
                        "type": "string"
                    },
                    "example": {
                        "type": "string",
                        "nullable": true
                    },
                    "synonyms": {
                        "type": "array",
                        "items": {
                            "type": "string"
                        }
                    },
                    "order": {
                        "type": "integer",
                        "default": 0
                    }
                },
                "required": [
                    "id",
                    "meaning",
                    "part_of_speech"
                ]
            },
            "FontSizeEnum": {
                "enum": [
                    "small",
                    "medium",
                    "large"
                ],
                "type": "string",
                "description": "* `small` - small\n* `medium` - medium\n* `large` - large"
            },
            "PatchedUser": {
                "type": "object",
                "description": "Serializer for User domain entity.\n\nHandles user profile data for registration and profile updates.",
                "properties": {
                    "id": {
                        "type": "string",
                        "format": "uuid",
                        "readOnly": true
                    },
                    "email": {
                        "type": "string",
                        "format": "email"
                    },
                    "full_name": {
                        "type": "string",
                        "nullable": true
                    },
                    "avatar_url": {
                        "type": "string",
                        "format": "uri",
                        "nullable": true
                    },
                    "created_at": {
                        "type": "string",
                        "format": "date-time",
                        "readOnly": true
                    },
                    "updated_at": {
                        "type": "string",
                        "format": "date-time",
                        "readOnly": true
                    }
                }
            },
            "PatchedUserPreferences": {
                "type": "object",
                "description": "Serializer for UserPreferences domain entity.\n\nHandles user UI and reading preferences.",
                "properties": {
                    "id": {
                        "type": "string",
                        "format": "uuid",
                        "readOnly": true
                    },
                    "user_id": {
                        "type": "string",
                        "format": "uuid",
                        "readOnly": true
                    },
                    "is_dark_mode": {
                        "type": "boolean",
                        "default": false
                    },
                    "language": {
                        "type": "string",
                        "default": "en"
                    },
                    "notifications_enabled": {
                        "type": "boolean",
                        "default": true
                    },
                    "font_size": {
                        "allOf": [
                            {
                                "$ref": "#/components/schemas/FontSizeEnum"
                            }
                        ],
                        "default": "medium"
                    },
                    "reading_line_height": {
                        "type": "number",
                        "format": "double",
                        "maximum": 2.0,
                        "minimum": 1.0,
                        "default": 1.6
                    }
                }
            },
            "User": {
                "type": "object",
                "description": "Serializer for User domain entity.\n\nHandles user profile data for registration and profile updates.",
                "properties": {
                    "id": {
                        "type": "string",
                        "format": "uuid",
                        "readOnly": true
                    },
                    "email": {
                        "type": "string",
                        "format": "email"
                    },
                    "full_name": {
                        "type": "string",
                        "nullable": true
                    },
                    "avatar_url": {
                        "type": "string",
                        "format": "uri",
                        "nullable": true
                    },
                    "created_at": {
                        "type": "string",
                        "format": "date-time",
                        "readOnly": true
                    },
                    "updated_at": {
                        "type": "string",
                        "format": "date-time",
                        "readOnly": true
                    }
                },
                "required": [
                    "created_at",
                    "email",
                    "id",
                    "updated_at"
                ]
            },
            "UserPreferences": {
                "type": "object",
                "description": "Serializer for UserPreferences domain entity.\n\nHandles user UI and reading preferences.",
                "properties": {
                    "id": {
                        "type": "string",
                        "format": "uuid",
                        "readOnly": true
                    },
                    "user_id": {
                        "type": "string",
                        "format": "uuid",
                        "readOnly": true
                    },
                    "is_dark_mode": {
                        "type": "boolean",
                        "default": false
                    },
                    "language": {
                        "type": "string",
                        "default": "en"
                    },
                    "notifications_enabled": {
                        "type": "boolean",
                        "default": true
                    },
                    "font_size": {
                        "allOf": [
                            {
                                "$ref": "#/components/schemas/FontSizeEnum"
                            }
                        ],
                        "default": "medium"
                    },
                    "reading_line_height": {
                        "type": "number",
                        "format": "double",
                        "maximum": 2.0,
                        "minimum": 1.0,
                        "default": 1.6
                    }
                },
                "required": [
                    "id",
                    "user_id"
                ]
            },
            "UserRegistration": {
                "type": "object",
                "description": "Serializer for user registration.\n\nIncludes password field for registration (not returned in responses).",
                "properties": {
                    "email": {
                        "type": "string",
                        "format": "email"
                    },
                    "password": {
                        "type": "string",
                        "writeOnly": true,
                        "minLength": 8
                    },
                    "full_name": {
                        "type": "string",
                        "nullable": true
                    }
                },
                "required": [
                    "email",
                    "password"
                ]
            },
            "VocabularyEntry": {
                "type": "object",
                "properties": {
                    "id": {
                        "type": "string",
                        "format": "uuid",
                        "readOnly": true
                    },
                    "user_id": {
                        "type": "string",
                        "format": "uuid",
                        "readOnly": true
                    },
                    "word_id": {
                        "type": "string",
                        "format": "uuid"
                    },
                    "word_text": {
                        "type": "string",
                        "readOnly": true
                    },
                    "meaning": {
                        "type": "string"
                    },
                    "saved_at": {
                        "type": "string",
                        "format": "date-time",
                        "readOnly": true
                    },
                    "review_count": {
                        "type": "integer",
                        "readOnly": true,
                        "default": 0
                    },
                    "last_reviewed_at": {
                        "type": "string",
                        "format": "date-time",
                        "readOnly": true
                    }
                },
                "required": [
                    "id",
                    "last_reviewed_at",
                    "meaning",
                    "review_count",
                    "saved_at",
                    "user_id",
                    "word_id",
                    "word_text"
                ]
            },
            "Word": {
                "type": "object",
                "description": "Serializer for Word domain entity.\n\nHandles serialization of complete word entries including definitions,\npronunciation, and metadata.",
                "properties": {
                    "id": {
                        "type": "string",
                        "format": "uuid",
                        "readOnly": true
                    },
                    "text": {
                        "type": "string"
                    },
                    "language": {
                        "type": "string"
                    },
                    "phonetic": {
                        "type": "string",
                        "nullable": true
                    },
                    "audio_url": {
                        "type": "string",
                        "format": "uri",
                        "nullable": true
                    },
                    "created_at": {
                        "type": "string",
                        "format": "date-time",
                        "readOnly": true
                    },
                    "definitions": {
                        "type": "array",
                        "items": {
                            "$ref": "#/components/schemas/Definition"
                        },
                        "readOnly": true
                    }
                },
                "required": [
                    "created_at",
                    "definitions",
                    "id",
                    "language",
                    "text"
                ]
            }
        },
        "securitySchemes": {
            "jwtAuth": {
                "type": "http",
                "scheme": "bearer",
                "bearerFormat": "JWT"
            }
        }
    }
}